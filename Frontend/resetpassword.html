<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        linear-gradient(rgba(0,40,85,0.75), rgba(0,40,85,0.75)),
        url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }
    /* logo */
    .logo{
      position:absolute;
      top:40px;
      right:40px;
      z-index:2;
    }
    .logo img{
      width:200px;
      height:auto;
    }
    .container{
      width:420px;
      background:#fff;
      padding:45px;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
      transition: all 0.3s ease-in-out;
    }
    .container h1{
      font-size:24px;
      margin-bottom:35px;
      color:#000000;
      font-weight:400;
    }
    .form-group{
      margin-bottom:20px;
    }
    .form-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:500;
      color:#344054;
    }
    /* Remove default eye icon in Edge */
    input::-ms-reveal,
    input::-ms-clear {
        display: none;
    }
    
    .input-box{
      position:relative;
    }
    .input-box input{
      width:100%;
      padding:14px 45px 14px 14px;
      border:1px solid #d5d5d5;
      border-radius:8px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }
    .input-box input:focus{
      border-color:#0796FE;
      box-shadow:0 0 5px rgba(7, 150, 254, 0.4);
    }
    .eye-icon{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .eye-icon svg {
      width: 20px;
      height: 20px;
      stroke: #667085;
      transition: stroke 0.2s, transform 0.2s;
    }
    .eye-icon:hover svg {
      stroke: #0796FE;
      transform: scale(1.05);
    }
    .btn{
      width:100%;
      padding:14px;
      background:#0796FE;
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
      transition:0.3s;
      font-weight: 500;
    }
    .btn:hover{
      background:#0571c7;
    }
    /* Error Message style */
    .error-message {
      color: #d92d20;
      font-size: 14px;
      margin-bottom: 15px;
      display: none;
      text-align: left;
      font-weight: 500;
    }
    /* Success Card styles */
    .success-card {
      text-align: center;
      padding: 10px 0;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .success-icon-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 30px;
    }
    .success-icon {
      width: 100px;
      height: 100px;
    }
    .success-rays {
      transform-origin: 50px 50px;
      animation: popRays 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
      opacity: 0;
    }
    .success-checkmark-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.6s cubic-bezier(0.65, 0, 0.45, 1) 0.3s forwards;
    }
    .success-card h2 {
      font-size: 24px;
      font-weight: 600;
      color: #101828;
      margin-bottom: 12px;
    }
    .success-card p {
      font-size: 14px;
      color: #667085;
      line-height: 1.5;
    }
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    @keyframes popRays {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
    @keyframes drawCheck {
      to {
        stroke-dashoffset: 0;
      }
    }
    @media(max-width:500px){
      .container{
        width:90%;
        padding:30px;
      }
      .logo{
        top: 20px;
        right: 50%;
        transform: translateX(50%);
      }
      .logo img{
        width:150px;
      }
    }
  </style>
</head>
<body>
<div class="logo">
    <a href="index.html">
        <img src="img/creativesweb.png" alt="Creatives Web Logo">
    </a>
</div>
  <div class="container">
    <!-- Reset Form Section -->
    <div id="resetFormSection">
      <h1>Reset Password</h1>
      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group password-box">
          <label for="newPassword">New Password</label>
      
          <div class="input-box">
              <input type="password" id="newPassword" placeholder="Enter new password" required>
      
              <span class="eye-icon" onclick="togglePassword('newPassword', this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
              </span>
          </div>
        </div>
      
        <div class="form-group password-box">
          <label for="confirmPassword">Confirm Password</label>
      
          <div class="input-box">
              <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
      
              <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
              </span>
          </div>
        </div>
        <div id="errorMsg" class="error-message"></div>
        <button type="submit" class="btn">
          Reset Password
        </button>
      </form>
    </div>
    <!-- Success Section -->
    <div id="successCard" class="success-card" style="display: none;">
      <div class="success-icon-container">
        <svg class="success-icon" viewBox="0 0 100 100">
          <!-- 12 Radiating Rays -->
          <g class="success-rays" stroke="#0796FE" stroke-width="3" stroke-linecap="round">
            <line x1="80" y1="50" x2="94" y2="50" />
            <line x1="76" y1="65" x2="88" y2="72" />
            <line x1="65" y1="76" x2="72" y2="88" />
            <line x1="50" y1="80" x2="50" y2="94" />
            <line x1="35" y1="76" x2="28" y2="88" />
            <line x1="24" y1="65" x2="12" y2="72" />
            <line x1="20" y1="50" x2="6" y2="50" />
            <line x1="24" y1="35" x2="12" y2="28" />
            <line x1="35" y1="24" x2="28" y2="12" />
            <line x1="50" y1="20" x2="50" y2="6" />
            <line x1="65" y1="24" x2="72" y2="12" />
            <line x1="76" y1="35" x2="88" y2="28" />
          </g>
          <!-- Center Checkmark -->
          <path class="success-checkmark-path" d="M 36 50 L 46 60 L 64 42" stroke="#0796FE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
      </div>
      <h2>Successfully Changed !</h2>
      <p>Your password has been successfully changed.</p>
    </div>
  </div>
  <script>
    const EYE_OPEN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const EYE_SLASHED = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = EYE_OPEN;
      } else {
        input.type = "password";
        icon.innerHTML = EYE_SLASHED;
      }
    }
    function handleReset(event) {
      event.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // Reset error
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      if (!newPassword || !confirmPassword) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        errorMsg.style.display = 'block';
        return;
      }
      // Hide the form section
      document.getElementById('resetFormSection').style.display = 'none';
      
      // Display the success card
      document.getElementById('successCard').style.display = 'block';
    }
  </script>
</body>
</html>
